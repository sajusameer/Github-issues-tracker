<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- tailwind -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- daisyui -->
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body  class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white shadow-lg rounded-xl p-8 w-96">
        <img class="mx-auto mb-2" src="./assets/github-logo.png" alt="">
        <h1 class="text-2xl font-bold mb-2 text-center">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mb-6 text-center">Sign in to manage your issues</p>
        <div class="space-y-3">

            <fieldset class="fieldset">
  <legend class="fieldset-legend text-[16px]">Username</legend>
  <input id="username" class="border w-full p-2 mb-1 rounded text-[16px]"
placeholder="Username" >
  <p class="label text-[#4A00FF] text-[14px]">Default: admin</p>
</fieldset>
<fieldset class="fieldset">
  <legend class="fieldset-legend text-[16px]">Password</legend>
  <input id="password" type="password"
class="border w-full p-2 mb-1 rounded text-[16px] "
placeholder="Password">

  <p class="label text-[#4A00FF] text-[14px]">Default: admin123</p>
</fieldset>

<button onclick="login()"
class="bg-[#4A00FF] text-white w-full py-2 rounded">
Sign In
</button>

<p class="mt-4 text-sm text-gray-500">
   <div class="flex items-center gap-3">
  <hr class="flex-1 border-gray-300">
  <span>OR</span>
  <hr class="flex-1 border-gray-300">
</div>
</p>
<p class="text-center text-[14px] text-gray-500">Demo Credentials</p> 
<p class="text-center bg-gray-100 text-[16px]">Username: admin <br>
Password: admin123</p>

        </div>
    </div>
    <script src="./script/login.js"></script>
</body>


<!-- git commit -m "first commit" -->
</html>
