<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- tailwind -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- daisyui -->
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body  class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white shadow-lg rounded-xl p-8 w96">
        <img class="mx-auto" src="./assets/github-logo.png" alt="">
        <h1 class="text-2xl font-bold mb-2 text-center">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mb-6 text-center">Sign in to manage your issues</p>
        <div>

            <fieldset class="fieldset">
  <legend class="fieldset-legend">What is your name?</legend>
  <input id="username" class="border w-full p-2 mb-1 rounded"
placeholder="Username" >
  <p class="label">Default: admin</p>
</fieldset>
<fieldset class="fieldset">
  <legend class="fieldset-legend">What is your name?</legend>
  <input id="password" type="password"
class="border w-full p-2 mb-1 rounded"
placeholder="Password">

  <p class="label">Optional</p>
</fieldset>
        </div>



    </div>
    
</body>
</html>
